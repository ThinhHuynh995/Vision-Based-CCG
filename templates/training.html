<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Training</title><link rel="stylesheet" href="/static/css/main.css"></head><body>
{% include 'partials/nav.html' %}
<main class="panel page"><h1>Wizard Training (Weakly-Supervised + PCA AE)</h1>
<div class="wizard">
<section class="panel"><h2>Bước 1 — Chọn dataset</h2><textarea id="datasetsInput" rows="5">[{"path":"data/datasets/NWPU-Videos","override_label":null},{"path":"data/datasets/ShanghaiTech","override_label":null},{"path":"data/datasets/Avenue","override_label":null},{"path":"data/datasets/Anomaly-Videos","override_label":1},{"path":"data/datasets/Normal_Videos","override_label":0}]</textarea><button id="scanBtn">🔍 Quét tất cả dataset</button><pre id="scanOut"></pre></section>
<section class="panel"><h2>Bước 2 — Cấu hình</h2><textarea id="trainCfg" rows="8">{"fps":5,"resize":64,"clip_len":16,"max_clips_per_video":20,"augment_normal":true,"use_grayscale":false,"pca_components":32,"epochs":30,"lr":0.001,"val_split":0.2,"tau_base":0.5,"alpha":0.3}</textarea></section>
<section class="panel"><h2>Bước 3 — Training live</h2><button id="extractBtn">Bắt đầu Extract</button><button id="trainBtn">Bắt đầu Train</button><pre id="streamLog"></pre></section>
<section class="panel"><h2>Bước 4 — Kết quả</h2><button id="evalBtn">Đánh giá</button><pre id="evalOut"></pre></section>
</div></main>
