# ─────────────────────────────────────────────
# Vision-Based Abnormal Behavior Detection
# Configuration File
# ─────────────────────────────────────────────

project:
  name: "Vision-Based Phát Hiện Hành Vi Bất Thường"
  version: "1.0.0"

device: "cpu"          # "cpu" | "cuda" | "mps"
seed: 42

# ── Paths ─────────────────────────────────────
paths:
  data_raw:        "data/raw"
  data_processed:  "data/processed"
  data_samples:    "data/samples"
  model_weights:   "models/weights"
  output_videos:   "outputs/videos"
  output_images:   "outputs/images"
  output_reports:  "outputs/reports"

# ── Branch 1: Image Preprocessing ────────────
preprocessing:
  resize: [640, 640]          # [width, height]
  denoise:
    method: "gaussian"        # gaussian | median | bilateral | nlm
    kernel_size: 5
  enhancement:
    method: "clahe"           # clahe | histogram_eq | gamma
    clip_limit: 2.0
    tile_grid: [8, 8]
  sharpen: false

# ── Branch 2: Detection ───────────────────────
detection:
  model: "yolov8n"            # yolov8n | yolov8s | yolov8m
  confidence: 0.45
  iou_threshold: 0.45
  classes: [0]                # 0 = person (COCO)
  input_size: 640

# ── Branch 3: Classification ──────────────────
classification:
  model: "mobilenet_v3_small"  # mobilenet_v3_small | resnet50 | efficientnet_b0
  num_classes: 5
  class_names:
    0: "Normal"
    1: "Fighting"
    2: "Falling"
    3: "Loitering"
    4: "Crowd Panic"
  confidence_threshold: 0.60
  input_size: [224, 224]
  # Training hyperparams
  epochs: 20
  batch_size: 16
  lr: 0.001
  weight_decay: 1e-4

# ── Branch 4: Data Augmentation ───────────────
augmentation:
  p_flip: 0.5
  p_rotate: 0.3
  max_rotate_deg: 15
  p_brightness: 0.4
  p_blur: 0.2
  p_mixup: 0.3
  mixup_alpha: 0.4
  use_gan: false             # set true if GAN weights available

# ── Branch 5: Tracking ────────────────────────
tracking:
  max_age: 30                # frames before track deleted
  min_hits: 3
  iou_threshold: 0.3
  optical_flow: true
  heatmap_decay: 0.97        # accumulation decay factor
  density_radius: 20         # pixels for density estimation

# ── Anomaly Thresholds ────────────────────────
anomaly:
  speed_threshold: 80        # pixels/frame – too fast = suspicious
  crowd_density_threshold: 5  # persons/zone
  loiter_frames: 60          # frames stationary = loitering

# ── Video / Stream Input ─────────────────────────────────────────────────
io:
  # Source examples:
  #   File:    "data/raw/cctv_scene01.mp4"
  #   RTSP:    "rtsp://admin:pass@192.168.1.100:554/stream1"
  #   Webcam:  0   (integer index)
  source: "data/raw/sample.mp4"
  resize: null           # [width, height] or null to keep original
  buffer_size: 4         # threaded frame buffer size (for RTSP/webcam)
  reconnect_attempts: 3  # reconnect retries for dropped streams
  reconnect_delay: 2.0   # seconds between reconnects

# ── Dataset Ingest ───────────────────────────────────────────────────────
ingest:
  # For static image folders (camera screenshots already sorted by class)
  src_root: "data/raw_images"    # root with Normal/, Fighting/, ... subfolders
  out_root: "data/labeled/static"
  resize: null                   # [width, height] or null
